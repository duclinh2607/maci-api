<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width,
        initial-scale=1,
        viewport-fit=cover">

  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">

  <meta name="theme-color" content="#0c7fa0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style"
        content="black-translucent">

  <title>Mac II</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:-apple-system,BlinkMacSystemFont,
      "Segoe UI",Roboto,sans-serif;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
    }

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#f5f5f5;
    }

    .screen{
      position:fixed;
      inset:0;
      display:none;
      overflow:hidden;
    }

    .screen.active{
      display:block;
    }

    .bg{
      position:absolute;
      inset:0;
      background-size:cover;
      background-position:center;
      pointer-events:none;
    }

    .home-bg{
      background-image:url("giaodienchinh.jpg");
    }

    .sign-bg{
      background-image:url("chuky.jpg");
    }

    .me-bg{
      background-image:url("muccuatoi.jpg");
    }

    .btn{
      position:absolute;
      z-index:999;
      touch-action:manipulation;
    }

    .btn:active{
      transform:scale(.96);
      opacity:.7;
    }

    .login-btn{
      left:50%;
      transform:translateX(-50%);
      width:78%;
      height:7%;
      top:58%;
      border-radius:40px;
    }

    .btn-tab{
      bottom:0;
      width:33.33%;
      height:80px;
    }

    .home-tab{ left:0; }
    .sign-tab{ left:33.33%; }
    .me-tab{ left:66.66%; }

    .quick-phone{
      left:50%;
      transform:translateX(-50%);
      width:92%;
      height:11%;
      top:53%;
      border-radius:20px;
    }

    .me-btn{
      width:90%;
      left:5%;
      height:60px;
    }

    .top1{ top:220px; }
    .top2{ top:285px; }
    .top3{ top:350px; }
    .top4{ top:415px; }

    #phone{
      background:#f5f5f5;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
    }

    .header{
      width:100%;
      background:#0c7fa0;
      color:#fff;

      text-align:center;

      padding-top:
      calc(env(safe-area-inset-top) + 14px);

      padding-bottom:14px;

      font-size:19px;
      font-weight:600;

      position:sticky;
      top:0;
      z-index:1000;
    }

    .date{
      text-align:center;
      font-size:26px;
      margin-top:10px;
      color:#111;
    }

    .time{
      text-align:center;
      font-size:66px;
      font-weight:600;
      color:#1e40ff;
      line-height:1;
      margin-bottom:14px;
    }

    .buttons{
      display:flex;
      gap:8px;
      padding:0 8px 12px;
    }

    .btn2{
      flex:1;
      padding:12px 0;
      border-radius:6px;
      color:#fff;
      text-align:center;
      font-size:18px;
      font-weight:500;
    }

    .light{
      background:#9ad7ea;
    }

    .dark{
      background:#1e22ff;
    }

    .card{
      width:calc(100% - 16px);

      margin:6px auto 20px;

      border:10px solid #1f7a1f;

      background:#fff;

      padding:16px 14px;

      color:#1f7a1f;

      font-size:16px;

      line-height:1.5;
    }

    .card h3{
      font-size:18px;
      font-weight:700;
      text-align:center;
      margin-bottom:12px;
      line-height:1.35;
    }

    .card p{
      margin:4px 0;
    }

    .watermark{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:10;
    }

    .watermark span{
      position:absolute;
      color:rgba(0,0,0,.045);
      font-size:14px;
      transform:rotate(-25deg);
      white-space:nowrap;
    }

  </style>
</head>

<body>

<!-- LOGIN -->

<div id="login" class="screen active">

  <div class="bg"
       style="background-image:url('manhinhdangnhap.jpg')">
  </div>

  <div class="btn login-btn"
       onclick="loginApp()">
  </div>

</div>

<!-- HOME -->

<div id="home" class="screen">

  <div class="bg home-bg"></div>

  <div class="btn quick-phone"
       onclick="openPhone()">
  </div>

  <div class="btn btn-tab sign-tab"
       onclick="showTab('sign')">
  </div>

  <div class="btn btn-tab me-tab"
       onclick="showTab('me')">
  </div>

</div>

<!-- SIGN -->

<div id="sign" class="screen">

  <div class="bg sign-bg"></div>

  <div class="btn btn-tab home-tab"
       onclick="showTab('home')">
  </div>

  <div class="btn btn-tab me-tab"
       onclick="showTab('me')">
  </div>

</div>

<!-- ME -->

<div id="me" class="screen">

  <div class="bg me-bg"></div>

  <div class="btn btn-tab home-tab"
       onclick="showTab('home')">
  </div>

  <div class="btn btn-tab sign-tab"
       onclick="showTab('sign')">
  </div>

  <div class="btn me-btn top1"
       onclick="openPhone()">
  </div>

  <div class="btn me-btn top2"></div>
  <div class="btn me-btn top3"></div>
  <div class="btn me-btn top4"></div>

</div>

<!-- PHONE -->

<div id="phone" class="screen">

  <div class="watermark" id="wm"></div>

  <div class="header">
    智能手機標籤
  </div>

  <div class="date" id="dateText"></div>

  <div class="time" id="timeText"></div>

  <div class="buttons">

    <div class="btn2 light">
      Mã QR
    </div>

    <div class="btn2 dark">
      Thẻ kiểm soát
    </div>

  </div>

  <div class="card">

    <h3>
      Mac II Mang theo điện thoại thông minh/<br>
      đồng hồ<br>
      Thẻ kiểm soát1
    </h3>

    <p>
      <b>Mã nhân viên:</b>
      <span id="employeeId"></span>
    </p>

    <p>
      <b>Tên:</b>
      <span id="userName"></span>
    </p>

    <p>
      <b>Mục đích sử dụng:</b>
      <span id="purpose"></span>
    </p>

    <p>
      <b>Thương hiệu điện thoại:</b>
      <span id="brand"></span>
    </p>

    <p>
      <b>Model điện thoại:</b>
      <span id="model"></span>
    </p>

    <p>
      <b>Màu điện thoại:</b>
      <span id="color"></span>
    </p>

    <p>
      <b>Số serial điện thoại:</b>
      <span id="serial"></span>
    </p>

    <p>
      <b>Khu vực được ủy quyền bổ sung:</b>
      <span id="area"></span>
    </p>

  </div>

</div>

<script>

const AUTH_URL =
"https://raw.githubusercontent.com/duclinh2607/maci-authh/main/iphone.json";

let currentUser = null;

/* LOGIN */

async function loginApp(){

  // AUTO LOGIN
  const savedCode =
  localStorage.getItem("APP_CODE");

  if(savedCode){

    await checkCode(savedCode,true);

    return;
  }

  // NHẬP MÃ
  const code =
  prompt("Nhập mã truy cập:");

  if(!code){

    alert("Bạn phải nhập mã!");

    return;
  }

  await checkCode(code,false);
}

/* CHECK CODE */

async function checkCode(code,isAutoLogin){

  try{

    const res = await fetch(

      AUTH_URL + "?t=" + Date.now(),

      {
        cache:"no-store"
      }

    );

    const data =
    await res.json();

    // KHÓA APP
    if(data.enabled === false){

      localStorage.removeItem(
        "APP_CODE"
      );

      alert("Ứng dụng đã bị khóa!");

      return;
    }

    const users =
    data.users || [];

    currentUser =
    users.find(user =>

      String(user.code)
      .trim()
      .toLowerCase()

      ===

      code.trim()
      .toLowerCase()

    );

    // ĐÚNG MÃ
    if(currentUser){

      // LƯU MÃ
      localStorage.setItem(
        "APP_CODE",
        code
      );

      fillUserInfo(currentUser);

      showTab("home");

    }else{

      // XÓA MÃ
      localStorage.removeItem(
        "APP_CODE"
      );

      if(isAutoLogin){

        alert(
          "Quyền truy cập đã bị thu hồi!"
        );

      }else{

        alert(
          "Mã sai hoặc đã bị thu hồi!"
        );
      }
    }

  }catch(e){

    alert("Không thể kết nối server!");

  }
}

/* LOAD USER */

function fillUserInfo(user){

  document.getElementById("employeeId")
  .innerText = user.employeeId || "";

  document.getElementById("userName")
  .innerText = user.name || "";

  document.getElementById("purpose")
  .innerText = user.purpose || "";

  document.getElementById("brand")
  .innerText = user.brand || "";

  document.getElementById("model")
  .innerText = user.model || "";

  document.getElementById("color")
  .innerText = user.color || "";

  document.getElementById("serial")
  .innerText = user.serial || "";

  document.getElementById("area")
  .innerText = user.area || "";

  updateWatermark(
    user.employeeId + " " + user.name
  );
}

/* TAB */

function showTab(tab){

  document.querySelectorAll(".screen")
  .forEach(s=>{

    s.classList.remove("active");

  });

  document.getElementById(tab)
  .classList.add("active");
}

/* OPEN PHONE */

function openPhone(){

  showTab("phone");

}

/* TIME */

function updateTime(){

  const now = new Date();

  const days = [
    "Chủ Nhật",
    "Hai",
    "Ba",
    "Tư",
    "Năm",
    "Sáu",
    "Bảy"
  ];

  document.getElementById("dateText")
  .innerText =

  now.getFullYear()+"-"+

  (now.getMonth()+1)+"-"+

  now.getDate()

  +" Thứ "+days[now.getDay()];

  document.getElementById("timeText")
  .innerText =

  String(now.getHours())
  .padStart(2,"0")

  +":"

  +

  String(now.getMinutes())
  .padStart(2,"0")

  +":"

  +

  String(now.getSeconds())
  .padStart(2,"0");
}

setInterval(updateTime,1000);

updateTime();

/* WATERMARK */

function updateWatermark(text){

  const wm =
  document.getElementById("wm");

  wm.innerHTML = "";

  for(let i=0;i<8;i++){

    let top =
    (i+1)*(100/9);

    let l =
    document.createElement("span");

    l.innerText = text;

    l.style.left = "8%";

    l.style.top = top+"%";

    wm.appendChild(l);

    let r =
    document.createElement("span");

    r.innerText = text;

    r.style.left = "58%";

    r.style.top = (top+3)+"%";

    wm.appendChild(r);
  }
}

/* SWIPE */

let startX = 0;
let endX = 0;

document.addEventListener(
"touchstart",

e=>{

  startX =
  e.touches[0].clientX;

});

document.addEventListener(
"touchend",

e=>{

  endX =
  e.changedTouches[0].clientX;

  let diff =
  endX-startX;

  if(Math.abs(diff)<50)
  return;

  const c =
  document.querySelector(".screen.active").id;

  if(diff>0){

    if(c==="sign")
    showTab("home");

    else if(c==="me")
    showTab("sign");

    else if(c==="phone")
    showTab("me");

  }else{

    if(c==="home")
    showTab("sign");

    else if(c==="sign")
    showTab("me");

    else if(c==="me")
    showTab("phone");
  }
});

/* AUTO LOGIN */

window.addEventListener("load",()=>{

  const savedCode =
  localStorage.getItem("APP_CODE");

  if(savedCode){

    checkCode(savedCode,true);

  }
});

</script>

</body>
</html>
